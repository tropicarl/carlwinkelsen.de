<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>carlwinkelsen</title>
  <link rel="icon" href="cwfaviconred.ico" type="image/x-icon">

  <!-- 1. CW Design System (Tokens, Reset, Base ...) -->
  <link rel="stylesheet" href="style.css">

  <!-- 2. Navigation Mechanic -->
  <link rel="stylesheet" href="nav.css">
</head>
<body>
    <header class="cw-header">
        <nav class="cw-flex cw-w-full cw-flex--between">
            
            <span class="cw-brand" id="cw-toggle" data-text="carlwinkelsen">
            carlwinkelsen
            </span>
            
            <a href="impressum.html" class="cw-nav-pill">Impressum</a>

        </nav>    
    </header>

  <!-- ══════════════════════════════════════════
       STARTSEITE — geteilter Hintergrund
  ══════════════════════════════════════════ -->
  <div class="page" id="pageHome">

    <div class="home-half" id="hGreen">
      <span class="home-label">HELL</span>
      <span class="home-hint">be free
      </span>
    </div>

    <div class="home-divider" id="divider" aria-hidden="true"></div>

    <div class="home-half" id="hPurple">
      <span class="home-label">HEAVEN</span>
      <span class="home-hint">enter me</span>
    </div>

  </div>


  <!-- ══════════════════════════════════════════
       SEITE: Hell
       → Hier deinen hellen Seiteninhalt einfügen
  ══════════════════════════════════════════ -->
  <div class="page" id="pageGreen">
    <h1 class="page-title">cw visual</h1>
    <p class="page-sub">carlwinkelsen</p>
    <span class="page-hint">klick CW = zurück</span>
  </div>


  <!-- ══════════════════════════════════════════
       SEITE: Dunkel
       → Hier deinen dunklen Seiteninhalt einfügen
  ══════════════════════════════════════════ -->
  <div class="page" id="pagePurple">
    <h1 class="page-title">cw webtex</h1>
    <p class="page-sub">carlwinkelsen</p>
    <span class="page-hint">klick CW = zurück</span>
  </div>


  <!-- ══════════════════════════════════════════
       SEITE: Akzent (via Logo-Klick)
       → Hier deinen Akzent-Seiteninhalt einfügen
  ══════════════════════════════════════════ -->
  <div class="page" id="pageRed">
    <h1 class="page-title">carlwinkelsen</h1>
    <p class="page-sub">general@carlwinkelsen.de</p>
    <span class="page-hint">klick C oder W für zurück</span>
  </div>


  <!-- ══════════════════════════════════════════
       LOGO — rollendes Navigationselement
       Nicht verschieben. Wird via JS positioniert.
  ══════════════════════════════════════════ -->
  <!-- logoAnchor: nur vertikale Zentrierung via CSS
       logoWrap/splitLeft/splitRight: nur horizontale Position + Animation via JS -->
  <div id="logoAnchor">

    <div id="logoWrap" aria-label="Navigation" role="button" tabindex="0">
      <div class="ball">
        <img src="SVG/cwlogo.svg" alt="CW Logo">
      </div>
    </div>

    <!-- Logo-Hälften für Split-Animation -->
    <div id="splitLeft" aria-hidden="true">
      <div class="half-ball ball">
        <img src="SVG/cwlogo.svg" alt="">
      </div>
    </div>
    <div id="splitRight" aria-hidden="true">
      <div class="half-ball ball">
        <img src="SVG/cwlogo.svg" alt="">
      </div>
    </div>

  </div>

  <!-- Tooltip -->
  <div id="logoTip" role="tooltip">Startseite</div>


  <!-- Navigation Logic -->
  <script src="nav.js"></script>

</body>
</html>
