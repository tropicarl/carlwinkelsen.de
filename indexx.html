<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Centering</title>
    <style>
        :root {
            /* Light Theme Colors */
            --bg-color: #ffffff;
            --text-color: #000000;
            --player-bg-color: #ffffff;
            --item-bg-color: rgb(221, 219, 228);
            --arrow-color: #000000;
        }

        body.dark-mode {
            /* Dark Theme Colors */
            --bg-color: #121212;
            --text-color: #ffffff;
            --player-bg-color: #282828;
            --item-bg-color: #404040;
            --arrow-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .player {
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--player-bg-color);
            width: 90vw;
            aspect-ratio: 1 / 1;
            margin: auto;
            position: relative;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 10px;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        @media (min-width: 700px) {
            .player {
                width: 40vw;  
            }


            
        } 

        .item {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: var(--item-bg-color);
            transition: transform 0.3s ease, z-index 0s;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            
        }

        .header {
            width: 100vw;
            min-height: 5vh;
            text-align: center;
            font-size: 2.4rem;
            padding: 2rem 0;
        }

        .item img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: cover;
        }

        .arrow {
    display: none;
    position: absolute;
    cursor: pointer;
    color: var(--arrow-color);
    /* Add more styles as needed */
}

.left-arrow {
    left: -10px;
    top: 50%;
    transform: translateY(-50%);
}

.right-arrow {
    right: -10px;
    top: 50%;
    transform: translateY(-50%);
}

.up-arrow {
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
}

.down-arrow {
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
}

/* Show arrows when an item is in viewing mode */
.player.is-viewing .arrow {
    display: block;
}

.nav-menu {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 1000;
}

.nav-item {
    padding: 10px 20px;
    cursor: pointer;
    border-radius: 30px;
    border: 1px solid var(--text-color);
    background-color: var(--bg-color);
    color: var(--text-color);
    text-decoration: none;
    font-size: 1.2rem;
    transition: background-color 0.3s, color 0.3s;
    display: inline-block;
}

.nav-item:hover {
    background-color: var(--text-color);
    color: var(--bg-color);
}

.theme-toggle {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 1000;
    padding: 15px 24px;
    cursor: pointer;
    border-radius: 30px;
    border: 1px solid var(--text-color);
    background-color: var(--bg-color);
    color: var(--text-color);
    font-size: 2rem;
}

    </style>
</head>
<body>
    <div class="nav-menu">
        <a href="schach/index.html" class="nav-item">pixiechess</a>
    </div>

    <div class="header">
        Das ist ein unausgereiftes Interface für ein Interaktives Portfolio-Layout
        </div>

    <div class="player">
        <div class="arrow left-arrow">&#8592;</div>  <!-- Left Arrow -->
        <div class="arrow right-arrow">&#8594;</div> <!-- Right Arrow -->
        <div class="arrow up-arrow">&#8593;</div>    <!-- Up Arrow -->
        <div class="arrow down-arrow">&#8595;</div>  <!-- Down Arrow -->
        <div class="grid">
            <div class="item"><img src="images/Kflower.jpeg" alt="Kflower"></div>

    <button class="theme-toggle">Toggle Theme</button>

<script>
     let cumulativeTranslateX = 0;
let cumulativeTranslateY = 0;

function scaleUpItem(item) {
    let image = item.querySelector('img');
    if (item.classList.contains('clicked')) {
        if (item.classList.contains('viewing')) {
            // Zoom out
            item.classList.remove('clicked');
            item.classList.remove('viewing');
            document.querySelector('.grid').style.transform = 'scale(1) translate(0px, 0px)';
            cumulativeTranslateX = 0;
            cumulativeTranslateY = 0;
            document.querySelector('.player').classList.remove('is-viewing');
        } else {
            // Zoom in to viewing mode
            item.classList.add('viewing');
            document.querySelector('.player').classList.add('is-viewing');
            const scaleFactor = 5; // Corresponds to the 5x5 grid
            document.querySelector('.grid').style.transform = `scale(${scaleFactor}) translate(${cumulativeTranslateX}px, ${cumulativeTranslateY}px)`;
        }
    } else {
        document.querySelectorAll('.item.clicked').forEach(clickedItem => {
            let img = clickedItem.querySelector('img');
            clickedItem.classList.remove('clicked');
            clickedItem.classList.remove('viewing');
            clickedItem.style.transform = 'scale(1)';
            clickedItem.style.zIndex = '0';
            clickedItem.style.borderColor = 'initial'; 
            clickedItem.style.borderWidth = 'initial'; 
            clickedItem.style.borderStyle = 'initial';
            if (img) {
                img.style.zIndex = '0';
            } 
        });
        document.querySelector('.player').classList.remove('is-viewing');

        // Reset grid transform when selecting a new item
        document.querySelector('.grid').style.transform = 'scale(1) translate(0px, 0px)';
        cumulativeTranslateX = 0;
        cumulativeTranslateY = 0;

        item.classList.add('clicked');
        item.style.borderColor = 'red'; 
        item.style.borderWidth = '0px'; 
        item.style.borderStyle = 'solid';

        centerOnItem(item);
    }
}

document.querySelectorAll('.item').forEach(item => {
    item.addEventListener('click', () => {
        scaleUpItem(item);

        if (!item.classList.contains('clicked')) {
            centerOnItem(item);
        }
    });
});

function centerOnItem(item) {
    const itemRect = item.getBoundingClientRect();
    const playerRect = document.querySelector('.player').getBoundingClientRect();

    const itemCenterX = itemRect.left + itemRect.width / 2;
    const itemCenterY = itemRect.top + itemRect.height / 2;
    const playerCenterX = playerRect.left + playerRect.width / 2;
    const playerCenterY = playerRect.top + playerRect.height / 2;

    cumulativeTranslateX = playerCenterX - itemCenterX;
    cumulativeTranslateY = playerCenterY - itemCenterY;
}

function navigateToItem(currentItem, direction) {
    let items = document.querySelectorAll('.item');
    let currentIndex = Array.from(items).indexOf(currentItem);
    let nextIndex, gridColumns;

    // Assuming your grid always has 5 columns as per your CSS
    gridColumns = 5;

    if (direction === 'next') {
        nextIndex = (currentIndex + 1) % items.length;
    } else if (direction === 'prev') {
        nextIndex = (currentIndex - 1 + items.length) % items.length;
    } else if (direction === 'up') {
        nextIndex = (currentIndex - gridColumns + items.length) % items.length;
    } else if (direction === 'down') {
        nextIndex = (currentIndex + gridColumns) % items.length;
    }

    let nextItem = items[nextIndex];
    // Simulate a click to select the next item
    nextItem.click(); // This will call scaleUpItem
    nextItem.click(); // This will call it again to enter 'viewing' mode
}

document.querySelector('.left-arrow').addEventListener('click', () => {
    let currentItem = document.querySelector('.item.viewing');
    navigateToItem(currentItem, 'prev');
});

document.querySelector('.right-arrow').addEventListener('click', () => {
    let currentItem = document.querySelector('.item.viewing');
    navigateToItem(currentItem, 'next');
});

document.querySelector('.up-arrow').addEventListener('click', () => {
    let currentItem = document.querySelector('.item.viewing');
    navigateToItem(currentItem, 'up');
});

document.querySelector('.down-arrow').addEventListener('click', () => {
    let currentItem = document.querySelector('.item.viewing');
    navigateToItem(currentItem, 'down');
});

document.addEventListener('keydown', (event) => {
    let currentItem = document.querySelector('.item.viewing');
    if (!currentItem) {
        return; // Exit if no item is in viewing mode
    }

    switch (event.key) {
        case 'w':
        case 'W':
            navigateToItem(currentItem, 'up');
            break;
        case 'a':
        case 'A':
            navigateToItem(currentItem, 'prev');
            break;
        case 's':
        case 'S':
            navigateToItem(currentItem, 'down');
            break;
        case 'd':
        case 'D':
            navigateToItem(currentItem, 'next');
            break;
        // Add other key mappings if necessary
    }
});

document.querySelector('.theme-toggle').addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');
});

let isScrolling = false;
document.addEventListener('wheel', (event) => {
    let currentItem = document.querySelector('.item.viewing');
    if (!currentItem || isScrolling) {
        return; // Exit if no item is in viewing mode or if already scrolling
    }

    event.preventDefault(); // Prevent the page from scrolling

    isScrolling = true;

    if (event.deltaY < 0) {
        // Scrolling up
        navigateToItem(currentItem, 'prev');
    } else if (event.deltaY > 0) {
        // Scrolling down
        navigateToItem(currentItem, 'next');
    }

    // Reset the flag after a short delay to prevent rapid navigation
    setTimeout(() => { isScrolling = false; }, 500); // 500ms delay
});

    </script>
</body>
</html>
